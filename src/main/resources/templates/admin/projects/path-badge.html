<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Renders from either the caller's th:with-scoped local variables (initial per-row display in
  the wizard, before any live test) or the test-path endpoint's model attributes (after a "Test
  path" click) — both expose "status" (REACHABLE|UNREACHABLE|UNKNOWN, or null) and "message".
  Deliberately has no declared fragment parameters so it inherits whichever context calls it.
-->
<span th:fragment="badge" class="inline-flex items-center gap-1">
    <span th:if="${status == 'REACHABLE'}"
          class="inline-block text-xs bg-green-100 text-green-700 rounded px-2 py-0.5">Reachable</span>
    <span th:if="${status == 'UNREACHABLE'}"
          class="inline-block text-xs bg-red-100 text-red-700 rounded px-2 py-0.5">Unreachable</span>
    <span th:if="${status == null or status == 'UNKNOWN'}"
          class="inline-block text-xs bg-slate-100 text-slate-500 rounded px-2 py-0.5">Not tested</span>
    <span th:if="${message != null and !#strings.isEmpty(message)}"
          class="text-xs text-slate-400" th:text="${message}">message</span>
</span>
</body>
</html>
