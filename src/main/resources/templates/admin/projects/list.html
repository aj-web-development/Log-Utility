<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Projects · Log Utility')}"></head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen text-slate-800 dark:text-slate-100">
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a th:href="@{/admin}" class="font-semibold">Log Utility &middot; Admin</a>
            <div class="flex items-center gap-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="text-sm text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors duration-150">Sign out</button>
                </form>
                <span th:replace="~{fragments/head :: themeToggle}"></span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-lg font-semibold">Projects</h1>
            <div class="flex gap-2">
                <a th:href="@{/admin/projects/upload}"
                   class="border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 text-sm rounded px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors duration-150">Upload logback XML</a>
                <a th:href="@{/admin/projects/new}"
                   class="bg-slate-800 dark:bg-slate-700 text-white text-sm rounded px-3 py-2 hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors duration-150">+ New project</a>
            </div>
        </div>

        <!-- This element is both the page container and the HTMX-swappable fragment. -->
        <div id="project-list" th:fragment="projectList">
            <div th:if="${projects.isEmpty()}"
                 class="bg-white dark:bg-slate-800 rounded-xl shadow p-8 text-center text-slate-500 dark:text-slate-400">
                No projects yet.
                <a th:href="@{/admin/projects/new}" class="underline text-slate-700 dark:text-slate-300">Create one</a>.
            </div>

            <table th:unless="${projects.isEmpty()}"
                   class="w-full bg-white dark:bg-slate-800 rounded-xl shadow overflow-hidden text-sm">
                <thead class="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-left">
                    <tr>
                        <th class="px-4 py-2 font-medium">Name</th>
                        <th class="px-4 py-2 font-medium">Nodes</th>
                        <th class="px-4 py-2 font-medium">Fields</th>
                        <th class="px-4 py-2 font-medium">Updated</th>
                        <th class="px-4 py-2 font-medium text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${projects}" class="border-t border-slate-100 dark:border-slate-700 align-top">
                        <td class="px-4 py-2">
                            <span class="font-medium" th:text="${p.name()}">name</span>
                            <span th:if="${activeProjectId != null and activeProjectId == p.id().toString()}"
                                  class="ml-2 text-xs bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 rounded px-2 py-0.5">active</span>
                            <div class="text-xs text-slate-400 dark:text-slate-500" th:text="${p.description()}">desc</div>
                        </td>
                        <td class="px-4 py-2" th:text="${p.nodeCount()}">0</td>
                        <td class="px-4 py-2" th:text="${p.fieldCount()}">0</td>
                        <td class="px-4 py-2 text-slate-500 dark:text-slate-400"
                            th:text="${#strings.replace(#strings.substring(p.updatedAt().toString(),0,16),'T',' ')}">date</td>
                        <td class="px-4 py-2 text-right whitespace-nowrap">
                            <button type="button"
                                    th:attr="hx-post=@{/admin/projects/{id}/activate(id=${p.id()})}"
                                    hx-target="#project-list" hx-swap="outerHTML"
                                    class="text-xs text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors duration-150 mr-3">Set active</button>
                            <a th:href="@{/admin/projects/{id}/edit(id=${p.id()})}"
                               class="text-xs text-blue-600 dark:text-blue-400 hover:underline mr-3">Edit</a>
                            <button type="button"
                                    th:attr="hx-post=@{/admin/projects/{id}/delete(id=${p.id()})},hx-confirm='Delete project ' + ${p.name()} + '?'"
                                    hx-target="#project-list" hx-swap="outerHTML"
                                    class="text-xs text-red-600 dark:text-red-400 hover:underline">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
