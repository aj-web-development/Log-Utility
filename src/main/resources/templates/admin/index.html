<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Admin · Log Utility')}"></head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen text-slate-800 dark:text-slate-100">
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <span class="font-semibold">Log Utility &middot; Admin</span>
            <div class="flex items-center gap-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="text-sm text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors duration-150">Sign out</button>
                </form>
                <span th:replace="~{fragments/head :: themeToggle}"></span>
            </div>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow p-6">
            <h1 class="text-lg font-semibold">Welcome, <span th:text="${username}">admin</span></h1>
            <!-- sec:* attributes come from thymeleaf-extras-springsecurity6; rendering them
                 confirms the security dialect is active. -->
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">
                Signed in as <span class="font-medium" sec:authentication="name">user</span>,
                authorities <span sec:authentication="authorities">[ROLE_ADMIN]</span>.
            </p>
            <div class="mt-6">
                <a th:href="@{/admin/projects}"
                   class="inline-block bg-slate-800 dark:bg-slate-700 text-white text-sm rounded px-4 py-2 hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors duration-150">
                    Manage projects &rarr;
                </a>
            </div>
        </div>
    </main>
</body>
</html>
