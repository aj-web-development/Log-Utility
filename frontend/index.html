<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log Utility</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      // Applies the stored theme/skin before first paint so there's no flash of the wrong one -
      // same mechanism as the pre-React app's fragments/head.html IIFE.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var s = localStorage.getItem("skin");
          if (!["signal", "console", "paper"].includes(s)) s = "signal";
          document.documentElement.setAttribute("data-skin", s);
          var dark = t == null ? true : t === "dark";
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-skin", "signal");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
